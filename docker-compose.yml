version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: llm
      POSTGRES_PASSWORD: llm
      POSTGRES_DB: llm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://llm:llm@db:5432/llm
      ENABLE_HISTORY: "true"
      HF_HOME: /models
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - app

volumes:
  pgdata:

networks:
  app:
    driver: bridge

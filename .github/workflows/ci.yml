name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry==2.4.1

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          # Install CPU torch first to avoid CUDA bloat
          poetry run pip install torch --index-url https://download.pytorch.org/whl/cpu
          poetry install --no-root

      - name: Lint (ruff)
        run: poetry run ruff check app tests

      - name: Format check (ruff)
        run: poetry run ruff format --check app tests

      - name: Type check (mypy)
        run: poetry run mypy app

      - name: Test (fast, no model download)
        run: |
          poetry run pytest -m "not slow" \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=85

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image (verify Dockerfile is valid)
        run: |
          docker build \
            --file docker/api.Dockerfile \
            --build-arg MODEL_NAME=gpt2 \
            --target builder \
            --tag transformer-bistro-api:ci \
            .

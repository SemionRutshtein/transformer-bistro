server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy /api to the API service
    # On Railway: set API_URL env var to the internal API service URL
    location /api/ {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Proxy health probes to the API (served at root level, per spec)
    location = /healthz {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
    }

    location = /readyz {
        proxy_pass ${API_URL};
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
